<!DOCTYPE html>
<html>
<head>
  <title>GST Secure System</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    input, button { padding: 8px; margin: 5px; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th { background: #333; color: white; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="text" id="userid" placeholder="User ID"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h2>GST Entry System</h2>

<input type="text" id="party" placeholder="Party Name">
<input type="text" id="sellerGST" placeholder="Your GSTIN">
<input type="text" id="buyerGST" placeholder="Party GSTIN">
<input type="number" id="amount" placeholder="Amount">
<input type="number" id="gst" placeholder="GST %">

<button onclick="addEntry()">Add Entry</button>
<button onclick="logout()">Logout</button>

<table id="table">
  <tr>
    <th>Party</th>
    <th>State</th>
    <th>Amount</th>
    <th>CGST</th>
    <th>SGST</th>
    <th>IGST</th>
    <th>Total</th>
  </tr>
</table>

</div>

<script>

// 🔐 USERS (yaha user add kar sakte ho)
const users = {
  "admin": "12345",
  "aarian": "0000"
};

function login() {
  let id = document.getElementById("userid").value;
  let pass = document.getElementById("password").value;

  if (users[id] && users[id] === pass) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Invalid UserID or Password");
  }
}

function logout() {
  document.getElementById("login").style.display = "block";
  document.getElementById("app").style.display = "none";
}

// 🌍 STATE CODES
const stateCodes = {
  "01":"Jammu & Kashmir","02":"Himachal Pradesh","03":"Punjab","04":"Chandigarh",
  "05":"Uttarakhand","06":"Haryana","07":"Delhi","08":"Rajasthan","09":"Uttar Pradesh",
  "10":"Bihar","11":"Sikkim","12":"Arunachal Pradesh","13":"Nagaland","14":"Manipur",
  "15":"Mizoram","16":"Tripura","17":"Meghalaya","18":"Assam","19":"West Bengal",
  "20":"Jharkhand","21":"Odisha","22":"Chhattisgarh","23":"Madhya Pradesh",
  "24":"Gujarat","26":"Dadra & Nagar Haveli and Daman & Diu","27":"Maharashtra",
  "28":"Andhra Pradesh","29":"Karnataka","30":"Goa","31":"Lakshadweep",
  "32":"Kerala","33":"Tamil Nadu","34":"Puducherry","35":"Andaman & Nicobar",
  "36":"Telangana","37":"Andhra Pradesh (New)","38":"Ladakh"
};

function getState(gstin) {
  return stateCodes[gstin.substring(0,2)] || "Unknown";
}

// ➕ ENTRY
function addEntry() {
  let party = document.getElementById("party").value;
  let sellerGST = document.getElementById("sellerGST").value;
  let buyerGST = document.getElementById("buyerGST").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let gst = parseFloat(document.getElementById("gst").value);

  if (!party || !sellerGST || !buyerGST || !amount || !gst) {
    alert("Fill all fields");
    return;
  }

  let sellerState = getState(sellerGST);
  let buyerState = getState(buyerGST);

  let gstAmount = (amount * gst) / 100;

  let cgst = 0, sgst = 0, igst = 0;

  if (sellerState === buyerState) {
    cgst = gstAmount / 2;
    sgst = gstAmount / 2;
  } else {
    igst = gstAmount;
  }

  let total = amount + gstAmount;

  let table = document.getElementById("table");
  let row = table.insertRow();

  row.insertCell(0).innerHTML = party;
  row.insertCell(1).innerHTML = buyerState;
  row.insertCell(2).innerHTML = amount.toFixed(2);
  row.insertCell(3).innerHTML = cgst.toFixed(2);
  row.insertCell(4).innerHTML = sgst.toFixed(2);
  row.insertCell(5).innerHTML = igst.toFixed(2);
  row.insertCell(6).innerHTML = total.toFixed(2);

  document.getElementById("party").value = "";
}
</script>

</body>
</html>
