<script>

// 🔗 GOOGLE SHEET CONNECT (READY)
function saveToSheet(data) {
  fetch("https://script.google.com/macros/s/AKfycby3v-uqBKM_C-4EQ1bNiziWBqCkPmdidTuatA6mb4Ura6voXqYqGamIShsaXUvHOrfd/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => console.log("Saved to Google Sheet"))
  .catch(err => console.log(err));
}

// ➕ ENTRY FUNCTION
function addEntry() {
  let party = document.getElementById("party").value;
  let sellerGST = document.getElementById("sellerGST").value;
  let buyerGST = document.getElementById("buyerGST").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let gst = parseFloat(document.getElementById("gst").value);

  if (!party || !sellerGST || !buyerGST || !amount || !gst) {
    alert("Fill all fields");
    return;
  }

  let gstAmount = (amount * gst) / 100;

  let cgst = 0, sgst = 0, igst = 0;

  if (sellerGST.substring(0,2) === buyerGST.substring(0,2)) {
    cgst = gstAmount / 2;
    sgst = gstAmount / 2;
  } else {
    igst = gstAmount;
  }

  let total = amount + gstAmount;

  // 🔥 GOOGLE SHEET SAVE
  saveToSheet({
    party: party,
    gstin: buyerGST,
    amount: amount,
    cgst: cgst,
    sgst: sgst,
    igst: igst,
    total: total
  });

  alert("Saved to Google Sheet ✅");

  // clear fields
  document.getElementById("party").value = "";
  document.getElementById("sellerGST").value = "";
  document.getElementById("buyerGST").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("gst").value = "";
}

</script>
